<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приемка материалов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Адаптируем цвета под тему Telegram пользователя */
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px;
            margin: 0;
        }
        .item-block {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            position: relative;
        }
        .item-block h3 { margin-top: 0; font-size: 16px; }
        label { display: block; margin-top: 10px; font-size: 14px; font-weight: bold; }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 5px;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 14px;
        }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .add-btn {
            width: 100%; padding: 12px; margin-bottom: 30px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        .remove-btn {
            position: absolute; top: 10px; right: 10px;
            background: red; color: white; border: none;
            border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="items-container">
        </div>

    <button class="add-btn" onclick="addItem()">+ Добавить еще позицию</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        const container = document.getElementById('items-container');
        let itemCount = 0;

        // Функция для получения сегодняшней даты в формате YYYY-MM-DD (для input type="date")
        function getTodayDate() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        // Функция добавления нового блока формы
        function addItem() {
            itemCount++;
            const blockId = `item-${itemCount}`;
            const div = document.createElement('div');
            div.className = 'item-block';
            div.id = blockId;

            div.innerHTML = `
                ${itemCount > 1 ? `<button class="remove-btn" onclick="removeItem('${blockId}')">Удалить</button>` : ''}
                <h3>Позиция #${itemCount}</h3>
                
                <label>Дата прихода</label>
                <input type="date" class="i-date" value="${getTodayDate()}" required>

                <label>Категория</label>
                <select class="i-category">
                    <option value="Сыпучие материалы">Сыпучие материалы</option>
                    <option value="Металлопрокат">Металлопрокат</option>
                    <option value="Пиломатериалы">Пиломатериалы</option>
                    <option value="ГСМ">ГСМ</option>
                    <option value="Инструмент и расходники">Инструмент и расходники</option>
                    <option value="Прочее">Прочее</option>
                </select>

                <label>Наименование материала</label>
                <input type="text" class="i-name" placeholder="Например: Цемент М500" required>

                <div class="row">
                    <div>
                        <label>Кол-во</label>
                        <input type="number" class="i-qty" step="0.01" placeholder="100" required>
                    </div>
                    <div>
                        <label>Ед. изм.</label>
                        <select class="i-unit">
                            <option value="шт">шт</option>
                            <option value="кг">кг</option>
                            <option value="тн">тн</option>
                            <option value="м3">м³</option>
                            <option value="м.п.">м.п.</option>
                            <option value="меш">мешков</option>
                            <option value="литр">литров</option>
                        </select>
                    </div>
                </div>

                <label>Поставщик / Водитель</label>
                <input type="text" class="i-supplier" placeholder="ОсОО СтройМир / Газель 123">
            `;
            container.appendChild(div);
        }

        // Функция удаления блока
        function removeItem(id) {
            const block = document.getElementById(id);
            if(block) block.remove();
        }

        // Добавляем первую позицию при загрузке
        addItem();

        // Настройка главной кнопки Telegram
        tg.MainButton.text = "ОТПРАВИТЬ ДАННЫЕ В БОТ";
        tg.MainButton.show();

        // Обработка нажатия на главную кнопку
        tg.MainButton.onClick(() => {
            const blocks = document.querySelectorAll('.item-block');
            let items = [];
            let isValid = true;

            blocks.forEach(block => {
                const date = block.querySelector('.i-date').value;
                const category = block.querySelector('.i-category').value;
                const name = block.querySelector('.i-name').value;
                const qty = block.querySelector('.i-qty').value;
                const unit = block.querySelector('.i-unit').value;
                const supplier = block.querySelector('.i-supplier').value;

                // Простейшая проверка заполненности
                if(!name || !qty) {
                    isValid = false;
                }

                // Переводим дату из YYYY-MM-DD в более привычный DD.MM.YYYY
                const formattedDate = date.split('-').reverse().join('.');

                items.push({
                    date: formattedDate,
                    category: category,
                    material_name: name,
                    quantity: parseFloat(qty),
                    unit: unit,
                    supplier: supplier || "Не указан"
                });
            });

            if (!isValid) {
                tg.showAlert("Пожалуйста, заполните Наименование и Количество во всех позициях!");
                return;
            }

            // Формируем JSON и отправляем в бота
            const dataToSend = JSON.stringify({ items: items });
            tg.sendData(dataToSend);
        });
    </script>
</body>
</html>
